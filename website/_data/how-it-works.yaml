- title: Describe your content
  body: Write a JSON Schema (or let an AI generate one) with the fields, types, and validation rules for your content type.

- title: Edit in the browser
  body: The web UI generates a full editing interface from your schema. Create, edit, publish, and manage entries without touching JSON directly.

- title: Consume via API
  body: Fetch published content as JSON through the REST API. Authenticate with bearer tokens scoped per app with admin, editor, or viewer roles.

- title: Sync and deploy
  body: Export everything as a bundle and import it on another instance. Set up deployment webhooks to trigger rebuilds when content changes.
