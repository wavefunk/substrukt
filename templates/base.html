<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Substrukt{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    :root {
      --surface: #f8fafc;
      --card: #ffffff;
      --card-alt: #f1f5f9;
      --sidebar: #0f172a;
      --sidebar-hover: #1e293b;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #cbd5e1;
      --border-light: #e2e8f0;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --accent-soft: #fef3c7;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --success: #22c55e;
      --success-soft: #f0fdf4;
      --input-bg: #ffffff;
    }
    .dark {
      --surface: #09090b;
      --card: #18181b;
      --card-alt: #27272a;
      --sidebar: #09090b;
      --sidebar-hover: #27272a;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --border: #3f3f46;
      --border-light: #27272a;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --accent-soft: #451a03;
      --danger: #f87171;
      --danger-soft: #451a1a;
      --success: #4ade80;
      --success-soft: #052e16;
      --input-bg: #27272a;
    }
    .dark .EasyMDEContainer .CodeMirror {
      background: var(--input-bg);
      color: var(--text-primary);
      border-color: var(--border);
    }
    .dark .EasyMDEContainer .CodeMirror-cursor {
      border-left-color: var(--text-primary);
    }
    .dark .EasyMDEContainer .editor-toolbar {
      background: var(--card);
      border-color: var(--border);
    }
    .dark .EasyMDEContainer .editor-toolbar button {
      color: var(--text-secondary) !important;
    }
    .dark .EasyMDEContainer .editor-toolbar button:hover,
    .dark .EasyMDEContainer .editor-toolbar button.active {
      background: var(--card-alt);
      color: var(--text-primary) !important;
    }
    .dark .EasyMDEContainer .editor-preview,
    .dark .EasyMDEContainer .editor-preview-side {
      background: var(--card);
      color: var(--text-primary);
    }
    .dark .EasyMDEContainer .editor-preview pre,
    .dark .EasyMDEContainer .editor-preview-side pre {
      background: var(--card-alt);
    }
    .dark .EasyMDEContainer .CodeMirror-selected {
      background: var(--accent-soft) !important;
    }
    .dark .EasyMDEContainer .editor-toolbar.disabled-for-preview button:not(.no-disable) {
      opacity: 0.4;
    }
    *, *::before, *::after {
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
    }
  </style>
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          document.documentElement.classList.toggle('dark', e.matches);
        }
      });
    })();
  </script>
  <script src="https://cdn.twind.style" crossorigin></script>
  <script>
    twind.install({
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: 'var(--surface)',
            card: 'var(--card)',
            'card-alt': 'var(--card-alt)',
            sidebar: 'var(--sidebar)',
            'sidebar-hover': 'var(--sidebar-hover)',
            primary: 'var(--text-primary)',
            secondary: 'var(--text-secondary)',
            muted: 'var(--text-muted)',
            accent: { DEFAULT: 'var(--accent)', hover: 'var(--accent-hover)', soft: 'var(--accent-soft)' },
            danger: { DEFAULT: 'var(--danger)', soft: 'var(--danger-soft)' },
            success: { DEFAULT: 'var(--success)', soft: 'var(--success-soft)' },
            border: 'var(--border)',
            'border-light': 'var(--border-light)',
            'input-bg': 'var(--input-bg)',
          }
        }
      }
    });
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
</head>
<body class="bg-surface text-primary min-h-screen" hx-boost="true" hx-target="#main-content" hx-swap="innerHTML">
  <div class="flex min-h-screen">
    <nav id="sidebar-nav" class="w-56 bg-sidebar text-white p-4 flex flex-col gap-1 min-h-screen border-r border-border-light">
      {% include "_nav.html" %}
    </nav>
    <main id="main-content" class="flex-1 p-8">
      {% if flash_kind %}
      <div class="mb-4 p-4 rounded-md text-sm
        {% if flash_kind == 'success' %}bg-success-soft text-success border border-success
        {% elif flash_kind == 'error' %}bg-danger-soft text-danger border border-danger
        {% else %}bg-accent-soft text-accent border border-accent{% endif %}">
        {{ flash_message }}
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    function addArrayItem(name) {
      var container = document.getElementById('array-' + name);
      var template = document.getElementById('template-' + name);
      if (!container || !template) return;
      var index = container.querySelectorAll('.array-item').length;
      var html = template.innerHTML.replace(/__INDEX__/g, index);
      var div = document.createElement('div');
      div.className = 'array-item border border-border-light p-3 rounded mb-2';
      div.setAttribute('data-index', index);
      div.innerHTML = '<div class="flex justify-end mb-1"><button type="button" onclick="this.closest(\'.array-item\').remove()" class="text-danger text-sm hover:text-danger">Remove</button></div>' + html;
      container.appendChild(div);
      initMarkdownEditors();
      initUploadZones();
    }
    function initMarkdownEditors() {
      document.querySelectorAll('[data-markdown]:not(.easymde-attached)').forEach(function(el) {
        el.classList.add('easymde-attached');
        new EasyMDE({
          element: el,
          spellChecker: false,
          status: false,
          forceSync: true,
          toolbar: [
            'bold', 'italic', 'strikethrough', '|',
            'heading-1', 'heading-2', 'heading-3', '|',
            'code', 'quote', 'unordered-list', 'ordered-list', '|',
            'link', 'image', 'horizontal-rule', '|',
            'preview', 'side-by-side', 'fullscreen', '|',
            'guide'
          ],
          previewClass: ['editor-preview', 'markdown-body'],
          sideBySideFullscreen: false
        });
      });
    }
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    function initUploadZones() {
      document.querySelectorAll('[data-upload-zone]:not(.upload-zone-init)').forEach(function(zone) {
        zone.classList.add('upload-zone-init');
        var input = zone.querySelector('[data-upload-input]');
        var prompt = zone.querySelector('.upload-zone-prompt');
        var info = zone.querySelector('.upload-zone-info');
        var preview = zone.querySelector('.upload-zone-preview');
        if (!input) return;

        zone.addEventListener('dragover', function(e) {
          e.preventDefault();
          zone.classList.add('border-accent', 'bg-accent-soft');
        });
        zone.addEventListener('dragleave', function(e) {
          e.preventDefault();
          zone.classList.remove('border-accent', 'bg-accent-soft');
        });
        zone.addEventListener('drop', function(e) {
          e.preventDefault();
          zone.classList.remove('border-accent', 'bg-accent-soft');
          if (e.dataTransfer && e.dataTransfer.files.length > 0) {
            input.files = e.dataTransfer.files;
            input.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });

        input.addEventListener('change', function() {
          if (!input.files || !input.files[0]) return;
          var file = input.files[0];

          // Show file info
          info.textContent = file.name + ' (' + formatFileSize(file.size) + ', ' + (file.type || 'unknown type') + ')';
          info.classList.remove('hidden');
          prompt.classList.add('hidden');

          // Revoke previous preview URL if any
          var prevImg = preview.querySelector('img');
          if (prevImg && prevImg.dataset.objectUrl) {
            URL.revokeObjectURL(prevImg.dataset.objectUrl);
          }
          // Show image preview using safe DOM methods
          while (preview.firstChild) preview.removeChild(preview.firstChild);
          if (file.type && file.type.startsWith('image/')) {
            var url = URL.createObjectURL(file);
            var img = document.createElement('img');
            img.src = url;
            img.alt = 'Preview';
            img.dataset.objectUrl = url;
            img.className = 'h-24 max-w-xs object-contain rounded border border-border-light';
            img.onload = function() { URL.revokeObjectURL(url); };
            preview.appendChild(img);
            preview.classList.remove('hidden');
          } else {
            preview.classList.add('hidden');
          }
        });
      });
    }
    function initSubmitSpinner() {
      document.querySelectorAll('form[enctype="multipart/form-data"]:not(.spinner-init)').forEach(function(form) {
        form.classList.add('spinner-init');
        form.addEventListener('submit', function() {
          var hasFiles = false;
          form.querySelectorAll('input[type="file"]').forEach(function(input) {
            if (input.files && input.files.length > 0) hasFiles = true;
          });
          if (hasFiles) {
            var btn = form.querySelector('button[type="submit"]');
            if (btn) {
              btn.disabled = true;
              btn.dataset.originalText = btn.textContent;
              btn.textContent = 'Uploading...';
              btn.classList.add('opacity-75');
            }
          }
        });
      });
    }
    function resetSubmitSpinners() {
      document.querySelectorAll('button[type="submit"][data-original-text]').forEach(function(btn) {
        btn.disabled = false;
        btn.textContent = btn.dataset.originalText;
        btn.classList.remove('opacity-75');
        delete btn.dataset.originalText;
      });
    }
    function highlightActiveNav() {
      var path = window.location.pathname;
      document.querySelectorAll('#sidebar-nav a').forEach(function(link) {
        var href = link.getAttribute('href');
        if (!href) return;
        var isActive;
        if (href === '/apps') {
          isActive = (path === '/apps');
        } else {
          isActive = (path === href) || path.startsWith(href + '/');
        }
        if (isActive) {
          link.classList.add('bg-sidebar-hover', 'text-white');
        } else {
          link.classList.remove('bg-sidebar-hover', 'text-white');
        }
      });
    }
    initMarkdownEditors();
    initUploadZones();
    initSubmitSpinner();
    highlightActiveNav();
    document.body.addEventListener('htmx:afterSwap', function() {
      initMarkdownEditors();
      initUploadZones();
      initSubmitSpinner();
      resetSubmitSpinners();
      var titleEl = document.getElementById('page-title');
      if (titleEl) {
        document.title = titleEl.textContent.trim();
        titleEl.remove();
      }
    });
    document.body.addEventListener('htmx:afterSettle', function() {
      highlightActiveNav();
    });
    function toggleTheme() {
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.querySelectorAll('.theme-icon').forEach(function(el) {
        el.textContent = isDark ? '\u2600' : '\u263E';
      });
    }
  </script>
</body>
</html>
