<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Substrukt{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <link rel="stylesheet" href="/static/vendor/easymde.min.css">
  <style>
    /* EasyMDE dark mode overrides — mapped to wavefunk tokens */
    :root:not([data-mode="light"]) .EasyMDEContainer .CodeMirror {
      background: var(--bg-raised);
      color: var(--fg);
      border-color: var(--hairline);
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .CodeMirror-cursor {
      border-left-color: var(--fg);
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-toolbar {
      background: var(--bg-raised);
      border-color: var(--hairline);
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-toolbar button {
      color: var(--fg-muted) !important;
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-toolbar button:hover,
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-toolbar button.active {
      background: var(--bg-hover);
      color: var(--fg) !important;
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-preview,
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-preview-side {
      background: var(--bg-raised);
      color: var(--fg);
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-preview pre,
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-preview-side pre {
      background: var(--bg-hover);
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .CodeMirror-selected {
      background: var(--accent-wash) !important;
    }
    :root:not([data-mode="light"]) .EasyMDEContainer .editor-toolbar.disabled-for-preview button:not(.no-disable) {
      opacity: 0.4;
    }

    /* vanilla-jsoneditor dark mode overrides */
    :root:not([data-mode="light"]) .jse-theme-default,
    :root:not([data-mode="light"]) .vanilla-jsoneditor {
      --jse-theme-color: var(--accent);
      --jse-background-color: var(--bg-raised);
      --jse-text-color: var(--fg);
      --jse-panel-background: var(--bg-raised);
      --jse-panel-color: var(--fg);
      --jse-panel-border: var(--hairline);
      --jse-main-border: 1px solid var(--hairline);
      --jse-menu-color: var(--fg);
      --jse-menu-button-background-highlight: var(--bg-hover);
      --jse-context-menu-background: var(--bg-raised);
      --jse-context-menu-color: var(--fg);
      --jse-key-color: var(--accent);
      --jse-value-color-string: var(--ok);
      --jse-value-color-number: var(--info);
      --jse-delimiter-color: var(--fg-muted);
      --jse-selection-background-color: var(--accent-wash);
    }

    /* Milkdown/Crepe dark mode overrides — mapped to wavefunk tokens */
    .milkdown {
      --crepe-color-background: var(--bg);
      --crepe-color-surface: var(--bg-raised);
      --crepe-color-surface-low: var(--bg-sunken);
      --crepe-color-on-background: var(--fg);
      --crepe-color-on-surface: var(--fg);
      --crepe-color-on-surface-variant: var(--fg-muted);
      --crepe-color-primary: var(--accent);
      --crepe-color-secondary: var(--accent-dim);
      --crepe-color-outline: var(--hairline);
      --crepe-color-inline-code: var(--accent);
      --crepe-color-hover: var(--bg-hover);
      --crepe-color-selected: var(--accent-wash);
      --crepe-font-default: var(--font-body);
      --crepe-font-code: var(--font-mono);
      --crepe-shadow-1: var(--shadow-sm);
      --crepe-shadow-2: var(--shadow-md);
    }
    .wf-modal-body .milkdown .editor {
      min-height: calc(100vh - 200px);
    }
    .milkdown .ProseMirror img,
    .milkdown .ProseMirror .image-block {
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
      // dark is default (no data-mode="light" means dark)
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          if (e.matches) {
            document.documentElement.setAttribute('data-mode', 'light');
          } else {
            document.documentElement.removeAttribute('data-mode');
          }
        }
      });
    })();
  </script>
  <script src="/static/vendor/easymde.min.js"></script>
  <script src="/static/vendor/htmx.min.js"></script>
</head>
<body hx-boost="true" hx-target="#main-content" hx-swap="innerHTML">
  <div class="wf-shell">
    <aside class="wf-sidebar" id="sidebar-nav">
      {% include "_nav.html" %}
    </aside>
    <main class="wf-main wf-scroll" id="main-content">
      {% if has_richtext is defined and has_richtext %}
      <link rel="stylesheet" href="/static/css/milkdown-theme.css">
      <script src="/static/js/milkdown-editor.bundle.js"></script>
      {% endif %}
      {% if flash_kind %}
      <div class="wf-alert wf-mb-4 {% if flash_kind == 'success' %}ok{% elif flash_kind == 'error' %}err{% else %}info{% endif %}">
        <div class="wf-alert-bar"></div>
        <div>{{ flash_message }}</div>
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <div class="wf-modeline" role="status">
      <span class="wf-ml-seg wf-ml-chevron">SK</span>
      <span class="wf-ml-seg wf-ml-buffer">{% if app %}{{ app.slug }}{% else %}substrukt{% endif %}</span>
      <span class="wf-ml-seg wf-ml-mode"><span class="kicker">Role</span><span>{{ user_role }}</span></span>
      <span class="wf-ml-fill" aria-hidden="true"></span>
      <span class="wf-ml-seg">{{ current_username }}</span>
    </div>
    <div class="wf-minibuffer" id="minibuffer" role="log" aria-live="polite" aria-label="Echo area">
      <span class="wf-minibuffer-prompt">&lambda;</span>
      <span class="wf-minibuffer-msg" id="mb-msg"></span>
      <span class="wf-minibuffer-time" id="mb-time"></span>
      <div class="wf-minibuffer-history" id="mb-history" aria-hidden="true">
        <div class="row is-empty"><span class="msg">No messages yet.</span></div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var msgEl = document.getElementById('mb-msg');
      var timeEl = document.getElementById('mb-time');
      var historyEl = document.getElementById('mb-history');
      var KINDS = ['ok', 'warn', 'err', 'info'];
      var HISTORY_MAX = 8;
      var STALE_MS = 5000;
      var staleTimer = null;
      var historyItems = [];

      function fmtTime(d) {
        d = d || new Date();
        function pad(n) { return String(n).padStart(2, '0'); }
        return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      }

      function renderHistory() {
        while (historyEl.firstChild) historyEl.removeChild(historyEl.firstChild);
        if (!historyItems.length) {
          var empty = document.createElement('div');
          empty.className = 'row is-empty';
          var emptyMsg = document.createElement('span');
          emptyMsg.className = 'msg';
          emptyMsg.textContent = 'No messages yet.';
          empty.appendChild(emptyMsg);
          historyEl.appendChild(empty);
          return;
        }
        var items = historyItems.slice(-HISTORY_MAX).reverse();
        for (var i = 0; i < items.length; i++) {
          var h = items[i];
          var row = document.createElement('div');
          row.className = 'row' + (h.kind && KINDS.indexOf(h.kind) !== -1 ? ' is-' + h.kind : '');
          var timeSpan = document.createElement('span');
          timeSpan.className = 'time';
          timeSpan.textContent = h.time;
          var msgSpan = document.createElement('span');
          msgSpan.className = 'msg';
          msgSpan.textContent = h.msg;
          row.appendChild(timeSpan);
          row.appendChild(msgSpan);
          historyEl.appendChild(row);
        }
      }

      function echo(msg, opts) {
        if (msg == null || msg === '') return;
        opts = opts || {};
        var kind = opts.kind && KINDS.indexOf(opts.kind) !== -1 ? opts.kind : '';
        msgEl.className = 'wf-minibuffer-msg';
        void msgEl.offsetWidth;
        msgEl.textContent = msg;
        if (kind) msgEl.classList.add('is-' + kind);
        msgEl.classList.add('is-visible');
        var t = fmtTime();
        timeEl.textContent = t;
        historyItems.push({ msg: msg, kind: kind, time: t });
        if (historyItems.length > 40) historyItems.shift();
        renderHistory();
        clearTimeout(staleTimer);
        if (!opts.sticky) {
          staleTimer = setTimeout(function() { msgEl.classList.add('is-stale'); }, STALE_MS);
        }
      }

      function clearEcho() {
        clearTimeout(staleTimer);
        msgEl.classList.remove('is-visible', 'is-stale', 'is-ok', 'is-warn', 'is-err', 'is-info');
        msgEl.textContent = '';
        timeEl.textContent = '';
      }

      window.wfEcho = echo;
      window.wfEchoClear = clearEcho;

      document.body.addEventListener('wfEcho', function(e) {
        var d = e.detail || {};
        echo(d.msg || '', { kind: d.kind || '', sticky: d.sticky || false });
      });
    })();

    function addArrayItem(name, arrayDepth) {
      var container = document.getElementById('array-' + name);
      var tpl = document.getElementById('template-' + name);
      if (!container || !tpl) return;
      var index = 0;
      var items = container.querySelectorAll(':scope > .array-item');
      for (var i = 0; i < items.length; i++) {
        var idx = parseInt(items[i].getAttribute('data-index'), 10);
        if (idx >= index) index = idx + 1;
      }
      var placeholder = '__IDX_' + arrayDepth + '__';
      var markup = tpl.innerHTML.replace(new RegExp(placeholder, 'g'), index);
      var div = document.createElement('div');
      div.className = 'array-item wf-framed';
      div.setAttribute('data-index', index);
      var header = document.createElement('div');
      header.style.cssText = 'display: flex; justify-content: flex-end; margin-bottom: 4px;';
      var removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.style.cssText = 'color: var(--err); cursor: pointer; background: none; border: none; font-size: 13px;';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', function() { div.remove(); });
      header.appendChild(removeBtn);
      div.appendChild(header);
      var wrapper = document.createElement('div');
      wrapper.innerHTML = markup;
      while (wrapper.firstChild) { div.appendChild(wrapper.firstChild); }
      container.appendChild(div);
      initMarkdownEditors();
      initUploadZones();
    }
    function initMarkdownEditors() {
      document.querySelectorAll('[data-markdown]:not(.easymde-attached)').forEach(function(el) {
        el.classList.add('easymde-attached');
        new EasyMDE({
          element: el,
          spellChecker: false,
          status: false,
          forceSync: true,
          toolbar: [
            'bold', 'italic', 'strikethrough', '|',
            'heading-1', 'heading-2', 'heading-3', '|',
            'code', 'quote', 'unordered-list', 'ordered-list', '|',
            'link', 'image', 'horizontal-rule', '|',
            'preview', 'side-by-side', 'fullscreen', '|',
            'guide'
          ],
          previewClass: ['editor-preview', 'markdown-body'],
          sideBySideFullscreen: false
        });
      });
    }
    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    function initUploadZones() {
      document.querySelectorAll('[data-upload-zone]:not(.upload-zone-init)').forEach(function(zone) {
        zone.classList.add('upload-zone-init');
        var input = zone.querySelector('[data-upload-input]');
        if (!input) return;

        zone.addEventListener('dragover', function(e) {
          e.preventDefault();
          zone.classList.add('is-dragover');
        });
        zone.addEventListener('dragleave', function(e) {
          e.preventDefault();
          zone.classList.remove('is-dragover');
        });
        zone.addEventListener('drop', function(e) {
          e.preventDefault();
          zone.classList.remove('is-dragover');
          if (e.dataTransfer && e.dataTransfer.files.length > 0) {
            input.files = e.dataTransfer.files;
            input.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });

        input.addEventListener('change', function() {
          if (!input.files || !input.files[0]) return;
          var file = input.files[0];
          var glyph = zone.querySelector('.upload-zone-glyph');
          var title = zone.querySelector('.upload-zone-title');
          var hint = zone.querySelector('.upload-zone-hint');

          title.textContent = file.name;
          hint.textContent = formatFileSize(file.size) + ' · ' + (file.type || 'unknown type');

          var prevImg = glyph.querySelector('img');
          if (prevImg && prevImg.dataset.objectUrl) {
            URL.revokeObjectURL(prevImg.dataset.objectUrl);
          }
          if (file.type && file.type.startsWith('image/')) {
            var url = URL.createObjectURL(file);
            var img = document.createElement('img');
            img.src = url;
            img.alt = 'Preview';
            img.dataset.objectUrl = url;
            img.style.cssText = 'height: 96px; max-width: 20rem; object-fit: contain; border: 1px solid var(--hairline);';
            img.onload = function() { URL.revokeObjectURL(url); };
            while (glyph.firstChild) glyph.removeChild(glyph.firstChild);
            glyph.appendChild(img);
          } else {
            glyph.textContent = '✓';
          }
        });
      });
    }
    function initFormValidation() {
      document.querySelectorAll('form:not(.validation-init)').forEach(function(form) {
        form.classList.add('validation-init');
        form.addEventListener('submit', function() {
          form.classList.add('was-validated');
        });
      });
    }
    function initSubmitSpinner() {
      document.querySelectorAll('form[enctype="multipart/form-data"]:not(.spinner-init)').forEach(function(form) {
        form.classList.add('spinner-init');
        form.addEventListener('submit', function() {
          var hasFiles = false;
          form.querySelectorAll('input[type="file"]').forEach(function(input) {
            if (input.files && input.files.length > 0) hasFiles = true;
          });
          if (hasFiles) {
            var btn = form.querySelector('button[type="submit"]');
            if (btn) {
              btn.disabled = true;
              btn.dataset.originalText = btn.textContent;
              btn.textContent = 'Uploading...';
              btn.classList.add('opacity-75');
            }
          }
        });
      });
    }
    function resetSubmitSpinners() {
      document.querySelectorAll('button[type="submit"][data-original-text]').forEach(function(btn) {
        btn.disabled = false;
        btn.textContent = btn.dataset.originalText;
        btn.classList.remove('opacity-75');
        delete btn.dataset.originalText;
      });
    }
    function highlightActiveNav() {
      var path = window.location.pathname;
      document.querySelectorAll('#sidebar-nav a.wf-nav-item').forEach(function(link) {
        var href = link.getAttribute('href');
        if (!href) return;
        var isActive;
        if (href === '/apps') {
          isActive = (path === '/apps');
        } else {
          isActive = (path === href) || path.startsWith(href + '/');
        }
        if (isActive) {
          link.classList.add('is-active');
        } else {
          link.classList.remove('is-active');
        }
      });
    }
    function toggleTheme() {
      var isLight = document.documentElement.getAttribute('data-mode') === 'light';
      if (isLight) {
        document.documentElement.removeAttribute('data-mode');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-mode', 'light');
        localStorage.setItem('theme', 'light');
      }
      document.querySelectorAll('.theme-icon').forEach(function(el) {
        el.textContent = document.documentElement.getAttribute('data-mode') === 'light' ? '☾' : '☀';
      });
    }
    function copyToClipboard(elementId, btn) {
      var text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(function() {
        var original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = original; }, 2000);
      });
    }
    initMarkdownEditors();
    if (window.initRichtextEditors) initRichtextEditors();
    initUploadZones();
    initSubmitSpinner();
    initFormValidation();
    highlightActiveNav();
    document.body.addEventListener('htmx:afterSwap', function() {
      initMarkdownEditors();
      if (window.initRichtextEditors) initRichtextEditors();
      initUploadZones();
      initSubmitSpinner();
      initFormValidation();
      resetSubmitSpinners();
      var titleEl = document.getElementById('page-title');
      if (titleEl) {
        var fullTitle = titleEl.textContent.trim();
        document.title = fullTitle;
        titleEl.remove();
        var label = fullTitle.replace(/\s*—\s*Substrukt$/, '');
        if (label) wfEcho('Switched to '+label + '.');
      }
    });
    document.body.addEventListener('htmx:afterSettle', function() {
      highlightActiveNav();
    });
  </script>
</body>
</html>
