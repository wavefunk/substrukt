<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Substrukt{% endblock %}</title>
  <script src="https://cdn.twind.style" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex min-h-screen">
    {% include "_nav.html" %}
    <main class="flex-1 p-8">
      {% if flash_kind %}
      <div class="mb-4 p-4 rounded-md text-sm
        {% if flash_kind == 'success' %}bg-green-50 text-green-800 border border-green-200
        {% elif flash_kind == 'error' %}bg-red-50 text-red-800 border border-red-200
        {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
        {{ flash_message }}
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    function addArrayItem(name) {
      var container = document.getElementById('array-' + name);
      var template = document.getElementById('template-' + name);
      if (!container || !template) return;
      var index = container.querySelectorAll('.array-item').length;
      var html = template.innerHTML.replace(/__INDEX__/g, index);
      var div = document.createElement('div');
      div.className = 'array-item border border-gray-100 p-3 rounded mb-2';
      div.setAttribute('data-index', index);
      div.innerHTML = '<div class="flex justify-end mb-1"><button type="button" onclick="this.closest(\'.array-item\').remove()" class="text-red-500 text-sm hover:text-red-700">Remove</button></div>' + html;
      container.appendChild(div);
    }
  </script>
</body>
</html>
