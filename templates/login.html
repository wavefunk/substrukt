<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Login — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    :root {
      --surface: #f8fafc;
      --card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #cbd5e1;
      --accent: #f59e0b;
      --accent-hover: #d97706;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --input-bg: #ffffff;
    }
    .dark {
      --surface: #09090b;
      --card: #18181b;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --border: #3f3f46;
      --accent: #f59e0b;
      --accent-hover: #fbbf24;
      --danger: #f87171;
      --danger-soft: #451a1a;
      --input-bg: #27272a;
    }
    *, *::before, *::after {
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
    }
  </style>
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          document.documentElement.classList.toggle('dark', e.matches);
        }
      });
    })();
  </script>
  <script src="https://cdn.twind.style" crossorigin></script>
  <script>
    twind.install({
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: 'var(--surface)',
            card: 'var(--card)',
            primary: 'var(--text-primary)',
            secondary: 'var(--text-secondary)',
            muted: 'var(--text-muted)',
            accent: { DEFAULT: 'var(--accent)', hover: 'var(--accent-hover)' },
            danger: { DEFAULT: 'var(--danger)', soft: 'var(--danger-soft)' },
            border: 'var(--border)',
            'input-bg': 'var(--input-bg)',
          }
        }
      }
    });
  </script>
</head>
<body class="bg-surface text-primary min-h-screen flex items-center justify-center">
  <div class="bg-card rounded-lg shadow-lg p-8 w-full max-w-sm relative">
    <button onclick="var d=document.documentElement.classList.toggle('dark');localStorage.setItem('theme',d?'dark':'light');this.querySelector('.theme-icon').textContent=d?'\u2600':'\u263E'" class="absolute top-4 right-4 text-muted hover:text-primary text-sm">
      <span class="theme-icon"></span>
    </button>
    <script>(function(){var el=document.currentScript.previousElementSibling.querySelector('.theme-icon');el.textContent=document.documentElement.classList.contains('dark')?'\u2600':'\u263E'})()</script>
    <div class="flex flex-col items-center mb-6">
      <img src="/static/favicon.svg" alt="" class="w-10 h-10 mb-3">
      <h1 class="text-2xl font-bold text-center font-mono tracking-tight">Substrukt</h1>
      <p class="text-sm text-muted mt-1">Schema-driven content management</p>
    </div>
    {% if error %}
    <div class="bg-danger-soft text-danger p-3 rounded mb-4 text-sm" role="alert">
      {{ error }}
      {% if show_resend %}
      <br><a href="/verify-pending" class="underline">Resend verification email</a>
      {% endif %}
    </div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-secondary mb-1">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username" value="{{ username }}"
          class="w-full px-3 py-2 border border-border rounded-md bg-input-bg focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent">
      </div>
      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-secondary mb-1">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
          class="w-full px-3 py-2 border border-border rounded-md bg-input-bg focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent">
      </div>
      <button type="submit" class="w-full bg-accent text-black py-2 px-4 rounded-md hover:bg-accent-hover font-medium">
        Log In
      </button>
    </form>
    <p class="text-sm text-center mt-4">
      <a href="/forgot-password" class="text-secondary hover:text-primary">Forgot password?</a>
    </p>
  </div>
</body>
</html>
