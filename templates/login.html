<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Login — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
    })();
  </script>
</head>
<body class="wf-f wf-ai-c wf-jc-c" style="background: var(--bg); color: var(--fg); min-height: 100vh;">
  <div class="wf-p-8 wf-w-full" style="border: 1px solid var(--hairline); max-width: 380px; position: relative;">
    <button class="wf-icon-btn ghost" style="position: absolute; top: 12px; right: 12px;" title="Toggle theme" onclick="var isLight=document.documentElement.getAttribute('data-mode')==='light';if(isLight){document.documentElement.removeAttribute('data-mode');localStorage.setItem('theme','dark')}else{document.documentElement.setAttribute('data-mode','light');localStorage.setItem('theme','light')};this.querySelector('.theme-icon').textContent=document.documentElement.getAttribute('data-mode')==='light'?'☾':'☀'">
      <span class="theme-icon">☀</span>
    </button>
    <script>(function(){var el=document.currentScript.previousElementSibling.querySelector('.theme-icon');el.textContent=document.documentElement.getAttribute('data-mode')==='light'?'☾':'☀'})()</script>
    <h1 class="wf-text-center">Substrukt</h1>
    <p class="wf-fg-muted wf-text-center wf-t-sm" style="margin: 6px 0 24px;">Schema-driven content management</p>
    {% if error %}
    <div class="wf-alert err wf-mb-4"><div class="wf-alert-bar"></div><div>
      {{ error }}
      {% if show_resend %}
      <br><a href="/verify-pending">Resend verification email</a>
      {% endif %}
    </div></div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <div class="wf-field wf-mt-4">
        <label class="wf-label" for="username">Username</label>
        <input class="wf-input wf-w-full wf-mt-1" id="username" name="username" type="text" required autofocus autocomplete="username" value="{{ username }}">
      </div>
      <div class="wf-field wf-mt-4">
        <label class="wf-label" for="password">Password</label>
        <input class="wf-input wf-w-full wf-mt-1" id="password" name="password" type="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="wf-btn primary wf-w-full wf-mt-5">
        Log In
      </button>
    </form>
    <p class="wf-text-center wf-mt-4 wf-t-sm">
      <a href="/forgot-password" class="wf-fg-muted">Forgot password?</a>
    </p>
  </div>
</body>
</html>
