<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Email verification — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
    })();
  </script>
</head>
<body class="wf-f wf-ai-c wf-jc-c" style="background: var(--bg); color: var(--fg); min-height: 100vh;">
  <div class="wf-p-8 wf-w-full" style="border: 1px solid var(--hairline); max-width: 380px; position: relative;">
    <h1 class="wf-text-center">Substrukt</h1>
    <div class="wf-mt-6">
    {% if success %}
      <div class="wf-alert ok wf-mb-4"><div class="wf-alert-bar"></div><div>{{ message }}</div></div>
      <a href="/login" class="wf-btn primary wf-w-full wf-jc-c">Log in</a>
    {% else %}
      <div class="wf-alert err wf-mb-4"><div class="wf-alert-bar"></div><div>{{ message }}</div></div>
      <a href="/verify-pending" class="wf-btn primary wf-w-full wf-jc-c">Request a new link</a>
    {% endif %}
    </div>
  </div>
</body>
</html>
