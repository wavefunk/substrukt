{% extends base_template %}
{% block title %}New App — Substrukt{% endblock %}
{% block content %}
<div class="wf-f wf-ai-c wf-jc-sb wf-mb-6">
  <h1>New App</h1>
  <a href="/apps" class="wf-fg-muted">Back to Apps</a>
</div>

<div class="wf-panel" style="max-width: 520px;">
  <div class="wf-panel-body">
    <form method="post" action="/apps">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <div class="wf-field wf-mb-4">
        <label for="name" class="wf-label">App Name</label>
        <input type="text" id="name" name="name" required placeholder="My App" class="wf-input">
      </div>
      <div class="wf-field wf-mb-6">
        <label for="slug" class="wf-label">Slug</label>
        <input type="text" id="slug" name="slug" required placeholder="my-app" class="wf-input wf-mono">
        <p class="wf-fg-muted wf-t-sm wf-mt-1">Lowercase letters, numbers, and hyphens. Used in URLs and file paths.</p>
      </div>
      <button type="submit" class="wf-btn primary">Create App</button>
    </form>
  </div>
</div>

<script>
(function() {
  var nameInput = document.getElementById('name');
  var slugInput = document.getElementById('slug');
  if (nameInput && slugInput) {
    nameInput.addEventListener('input', function() {
      slugInput.value = nameInput.value
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-|-$/g, '');
    });
  }
})();
</script>
{% endblock %}
