<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Reset password — Substrukt</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/substrukt.css">
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored === 'light') {
        document.documentElement.setAttribute('data-mode', 'light');
      }
    })();
  </script>
</head>
<body class="wf-f wf-ai-c wf-jc-c" style="background: var(--bg); color: var(--fg); min-height: 100vh;">
  <div class="wf-p-8 wf-w-full" style="border: 1px solid var(--hairline); max-width: 380px; position: relative;">
    <h1 class="wf-text-center">Substrukt</h1>
    <p class="wf-fg-muted wf-text-center wf-t-sm" style="margin: 6px 0 24px;">Set a new password</p>
    {% if error %}
    <div class="wf-alert err wf-mb-4"><div class="wf-alert-bar"></div><div>{{ error }}</div></div>
    {% endif %}
    <form method="post" action="/reset-password">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="wf-field wf-mt-4">
        <label class="wf-label" for="password">New password</label>
        <input class="wf-input wf-w-full wf-mt-1" id="password" name="password" type="password" required autofocus autocomplete="new-password" minlength="8">
        <span class="wf-field-hint">At least 8 characters.</span>
      </div>
      <div class="wf-field wf-mt-4">
        <label class="wf-label" for="confirm_password">Confirm password</label>
        <input class="wf-input wf-w-full wf-mt-1" id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password" minlength="8">
      </div>
      <button type="submit" class="wf-btn primary wf-w-full wf-mt-5">
        Reset password
      </button>
    </form>
  </div>
</body>
</html>
