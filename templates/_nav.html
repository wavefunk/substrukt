<nav class="w-56 bg-gray-900 text-gray-100 p-4 flex flex-col gap-1 min-h-screen">
  <div class="text-lg font-bold mb-6 px-2">Substrukt</div>
  <a href="/" class="block px-3 py-2 rounded hover:bg-gray-700">Dashboard</a>
  <a href="/schemas" class="block px-3 py-2 rounded hover:bg-gray-700">Schemas</a>
  {% set nav_schemas = get_nav_schemas() %}
  {% if nav_schemas %}
  <div class="mt-3 mb-1 px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Content</div>
  {% for s in nav_schemas %}
  <a href="/content/{{ s.slug }}" class="block px-3 py-2 rounded hover:bg-gray-700 text-sm">{{ s.title }}</a>
  {% endfor %}
  {% endif %}
  <a href="/settings/tokens" class="block px-3 py-2 rounded hover:bg-gray-700 mt-3">API Tokens</a>
  <div class="mt-auto pt-4 border-t border-gray-700">
    <form method="post" action="/logout">
      <input type="hidden" name="_csrf" value="{{ csrf_token }}">
      <button type="submit" class="w-full text-left px-3 py-2 rounded hover:bg-gray-700 text-gray-400">Logout</button>
    </form>
  </div>
</nav>
